let AC=null;
function ensureAudio(){if(!AC)AC=new(AudioContext||webkitAudioContext)()}
function sfx(type){
  if(!AC)return;try{
  const o=AC.createOscillator(),g=AC.createGain();
  o.connect(g);g.connect(AC.destination);const t=AC.currentTime;
  ({
    hit(){o.type='sawtooth';o.frequency.setValueAtTime(220,t);o.frequency.exponentialRampToValueAtTime(80,t+.08);g.gain.setValueAtTime(.35,t);g.gain.exponentialRampToValueAtTime(.001,t+.1);o.start(t);o.stop(t+.1)},
    block(){o.type='square';o.frequency.setValueAtTime(600,t);o.frequency.exponentialRampToValueAtTime(400,t+.06);g.gain.setValueAtTime(.2,t);g.gain.exponentialRampToValueAtTime(.001,t+.08);o.start(t);o.stop(t+.08)},
    special(){o.type='sine';o.frequency.setValueAtTime(200,t);o.frequency.exponentialRampToValueAtTime(800,t+.15);o.frequency.exponentialRampToValueAtTime(400,t+.3);g.gain.setValueAtTime(.5,t);g.gain.exponentialRampToValueAtTime(.001,t+.35);o.start(t);o.stop(t+.35)},
    jump(){o.type='sine';o.frequency.setValueAtTime(300,t);o.frequency.exponentialRampToValueAtTime(500,t+.1);g.gain.setValueAtTime(.15,t);g.gain.exponentialRampToValueAtTime(.001,t+.12);o.start(t);o.stop(t+.12)},
    ko(){o.type='sawtooth';o.frequency.setValueAtTime(400,t);o.frequency.exponentialRampToValueAtTime(50,t+.5);g.gain.setValueAtTime(.6,t);g.gain.exponentialRampToValueAtTime(.001,t+.55);o.start(t);o.stop(t+.55)},
    whoosh(){o.type='triangle';o.frequency.setValueAtTime(800,t);o.frequency.exponentialRampToValueAtTime(200,t+.12);g.gain.setValueAtTime(.15,t);g.gain.exponentialRampToValueAtTime(.001,t+.14);o.start(t);o.stop(t+.14)},
    select(){o.type='sine';o.frequency.setValueAtTime(440,t);o.frequency.setValueAtTime(660,t+.08);g.gain.setValueAtTime(.25,t);g.gain.exponentialRampToValueAtTime(.001,t+.25);o.start(t);o.stop(t+.25)},
    cursor(){o.type='sine';o.frequency.setValueAtTime(330,t);g.gain.setValueAtTime(.12,t);g.gain.exponentialRampToValueAtTime(.001,t+.07);o.start(t);o.stop(t+.07)},
    ready(){o.type='sine';o.frequency.setValueAtTime(500,t);o.frequency.setValueAtTime(700,t+.1);g.gain.setValueAtTime(.3,t);g.gain.exponentialRampToValueAtTime(.001,t+.3);o.start(t);o.stop(t+.3)},
    uppercut(){o.type='sawtooth';o.frequency.setValueAtTime(150,t);o.frequency.exponentialRampToValueAtTime(600,t+.15);g.gain.setValueAtTime(.4,t);g.gain.exponentialRampToValueAtTime(.001,t+.2);o.start(t);o.stop(t+.2)},
    challenger(){
      // Dramatic rising tone
      const o2=AC.createOscillator(),g2=AC.createGain();
      o2.connect(g2);g2.connect(AC.destination);
      o2.type='sawtooth';
      o2.frequency.setValueAtTime(150,t);
      o2.frequency.exponentialRampToValueAtTime(600,t+0.3);
      o2.frequency.exponentialRampToValueAtTime(800,t+0.5);
      g2.gain.setValueAtTime(0.5,t);
      g2.gain.setValueAtTime(0.6,t+0.3);
      g2.gain.exponentialRampToValueAtTime(0.001,t+0.7);
      o2.start(t);o2.stop(t+0.7);
      const o3=AC.createOscillator(),g3=AC.createGain();
      o3.connect(g3);g3.connect(AC.destination);
      o3.type='sine';
      o3.frequency.setValueAtTime(300,t+0.1);
      o3.frequency.exponentialRampToValueAtTime(1200,t+0.5);
      g3.gain.setValueAtTime(0.3,t+0.1);
      g3.gain.exponentialRampToValueAtTime(0.001,t+0.6);
      o3.start(t+0.1);o3.stop(t+0.6);
      // Don't use the original o/g since we made our own
      g.gain.setValueAtTime(0,t);o.start(t);o.stop(t+.01);
    },
  })[type]?.()}catch(e){}}

async function joinLobby(){
  if(FIREBASE_CFG.apiKey==='REPLACE_ME'){mpStatus='Firebase not configured! See README';return;}
  try{
    if(!firebase.apps.length)firebase.initializeApp(FIREBASE_CFG);
    const auth=firebase.auth();
    const cred=await auth.signInAnonymously();
    myUid=cred.user.uid;
    const db=firebase.database();
    const myRef=db.ref('lobby/'+myUid);
    peer=new Peer();
    peer.on('open',(id)=>{
      myPeerId=id;
      myRef.set({name:'Fighter_'+myUid.slice(0,6),peerId:id,status:'waiting',ts:Date.now()});
      myRef.onDisconnect().remove();
      mpReady=true;
      mpStatus='In lobby — waiting for opponent';
    });
    peer.on('error',(e)=>{mpStatus='Peer error: '+e.type;});
    peer.on('connection',(conn)=>{setupPeerConn(conn);});
    // Listen for lobby changes
    const lobbyRef=db.ref('lobby');
    lobbyRef.on('child_added',(snap)=>{
      if(snap.key!==myUid&&snap.val().status==='waiting'){
        lobbyPlayers[snap.key]=snap.val();
      }
    });
    lobbyRef.on('child_removed',(snap)=>{
      delete lobbyPlayers[snap.key];
      if(snap.key===challengerUid&&gs==='challenge'){
        gs='lobby';challengerUid='';challengerName='';
        mpStatus='Opponent left...';
      }
    });
    lobbyRef.on('child_changed',(snap)=>{
      if(snap.key!==myUid){
        if(snap.val().status==='waiting')lobbyPlayers[snap.key]=snap.val();
        else delete lobbyPlayers[snap.key];
      }
    });
    // Listen for challenges to us
    db.ref('challenges/'+myUid).on('value',(snap)=>{
      if(!snap.exists())return;
      const d=snap.val();
      if(d.accepted&&d.responderPeerId&&mpRole==='host'){
        mpStatus='Connecting...';
        connectToPeer(d.responderPeerId);
        snap.ref.remove();
      }else if(d.from&&!d.accepted&&d.from!==myUid){
        challengerName=d.fromName||'Unknown';
        challengerUid=d.from;
        challengeData=d;
        challengeFlash=2.5;challengeAlpha=0;chalCur=0;
        challengeTimer=15;
        sfx('challenger');
        gs='challenge';
      }
    });
  }catch(e){mpStatus='Error: '+e.message;}
}

function sendChallenge(targetUid){
  firebase.database().ref('challenges/'+targetUid).set({
    from:myUid,fromName:'Fighter_'+myUid.slice(0,6),fromPeerId:myPeerId,ts:Date.now()
  });
  mpRole='host';
  mpStatus='Challenge sent! Waiting...';
}

function acceptChallenge(){
  if(!challengeData)return;
  firebase.database().ref('challenges/'+challengeData.from).set({
    ...challengeData,accepted:true,responderPeerId:myPeerId
  });
  mpRole='guest';
  mpStatus='Connecting...';
  connectToPeer(challengeData.fromPeerId);
  firebase.database().ref('lobby/'+myUid).update({status:'fighting'});
  challengeData=null;challengeTimer=null;
}

function declineChallenge(){
  if(challengeData)firebase.database().ref('challenges/'+myUid).remove();
  challengeData=null;challengerUid='';challengerName='';challengeTimer=null;
  gs='lobby';mpStatus='Waiting for opponent...';
}

function connectToPeer(remotePeerId){
  const conn=peer.connect(remotePeerId,{reliable:true,serialization:'json'});
  conn.on('open',()=>setupPeerConn(conn));
  conn.on('error',(e)=>{mpStatus='Connection failed';gs='lobby';});
}

function setupPeerConn(conn){
  peerConn=conn;mpConnected=true;
  localFrame=0;remoteFrame=0;remoteInputs={};localInputs={};
  mpCharConfirmed=false;mpOppChar=-1;
  mpStatus='Connected!';
  if(myUid)firebase.database().ref('lobby/'+myUid).update({status:'fighting'});
  conn.on('data',(data)=>{
    if(data.type==='input'){
      remoteInputs[data.frame]=data.inp;
      remoteFrame=Math.max(remoteFrame,data.frame);
    }else if(data.type==='charPick'){
      mpOppChar=data.char;
      // If both have picked, start
      if(mpCharConfirmed&&mpOppChar>=0)beginMpMatch();
    }else if(data.type==='rematch'){
      remoteWantsRematch=true;
      if(localWantsRematch)doRematch();
    }
  });
  conn.on('close',()=>{
    mpConnected=false;peerConn=null;
    mpStatus='Opponent disconnected';
    setTimeout(()=>{if(gs==='playing'||gs==='intro')gs='modeSelect';},1500);
  });
  setTimeout(()=>{gs='charSelect';},400);
}

function beginMpMatch(){
  const myChar=csCur, oppChar=mpOppChar;
  const pN=myChar===0?'TEKNIUM':'LOBSTER', cN=oppChar===0?'TEKNIUM':'LOBSTER';
  const pA=myChar===0?TEK_ATK:LOB_ATK, cA=oppChar===0?LOB_ATK:TEK_ATK;
  const pC=myChar===0?'tek':'lob', cC=oppChar===0?'lob':'tek';
  ftr=[new Fighter(0,300,pN,pA,1,false,pC),new Fighter(1,W-300,cN,cA,-1,false,cC)];
  ftr[0].rounds=sRds[0];ftr[1].rounds=sRds[1];
  roundT=ROUND_TIME;introT=3;projs.length=0;floats.length=0;particles.length=0;
  hitFlash=0;shakeT=0;slowMo=0;
  combo[0].n=combo[0].t=combo[0].d=0;combo[1].n=combo[1].t=combo[1].d=0;
  localFrame=0;remoteFrame=0;remoteInputs={};localInputs={};
  gs='intro';sfx('ready');
}

function doRematch(){
  sRds=[0,0];roundN=1;remoteWantsRematch=false;localWantsRematch=false;
  mpCharConfirmed=false;mpOppChar=-1;gs='charSelect';
}

function sendInput(frame,inp){
  if(peerConn&&peerConn.open)peerConn.send({type:'input',frame:frame,inp:inp});
}

function netInput(frame){
  if(remoteInputs[frame])return remoteInputs[frame];
  for(let f=frame-1;f>=Math.max(0,frame-10);f--)if(remoteInputs[f])return remoteInputs[f];
  return{l:0,r:0,j:0,cr:0,bl:0,lt:0,md:0,hv:0,sp:0,up:0};
}

function leaveLobby(){
  if(myUid){try{
    firebase.database().ref('lobby/'+myUid).remove();
    firebase.database().ref('challenges/'+myUid).remove();
  }catch(e){}}
  if(peerConn){peerConn.close();peerConn=null;}
  if(peer){peer.destroy();peer=null;}
  mpMode=false;mpReady=false;mpConnected=false;lobbyPlayers={};
  challengerUid='';challengerName='';challengeData=null;challengeTimer=null;
}

function chromaKey(img){
  const c=document.createElement('canvas');c.width=img.width;c.height=img.height;
  const cx=c.getContext('2d');cx.drawImage(img,0,0);
  const id=cx.getImageData(0,0,c.width,c.height),d=id.data;
  for(let i=0;i<d.length;i+=4){
    const r=d[i],g=d[i+1],b=d[i+2];
    if(g>100&&g>r+25&&g>b+25) d[i+3]=0;
    else if(g>80&&g>r+10&&g>b+10){
      const gn=(g-Math.max(r,b))/g;
      if(gn>.15) d[i+3]=Math.max(0,d[i+3]-Math.floor(gn*200));
    }
  }
  cx.putImageData(id,0,0);return c;
}

function loadSheet(key,src){
  const img=new Image();
  img.onload=()=>{sheets[key]=chromaKey(img);loaded++};
  img.onerror=()=>{console.error('FAIL:'+src);loaded++};
  img.src=src;
}
function loadBG(src){
  const img=new Image();
  img.onload=()=>{sheets.bg=img;loaded++};
  img.onerror=()=>{loaded++};
  img.src=src;
}

let aiDiff=1, aiCD=0, aiAggr=.5, aiMem={last:'idle'}, aiWP=0, aiSD=1, aiDT=0;
function aiInput(ai,pl,dt){
  const dm=[.35,1,1.8][aiDiff], rm=[.4,1,1.6][aiDiff];
  aiCD=Math.max(0,aiCD-dt); aiWP=Math.max(0,aiWP-dt);
  const dx=pl.x-ai.x, dist=Math.abs(dx);
  const I={l:0,r:0,j:0,cr:0,bl:0,lt:0,md:0,hv:0,sp:0,up:0};
  if(ai.st==='ko'||ai.st==='hurt'||ai.st==='attack')return I;
  const hr=ai.hp/ai.mhp, pr=pl.hp/pl.mhp;
  aiAggr=Math.max(.1,Math.min(1,(hr<.3&&pr>.5)?.2:(hr>.7&&pr<.3)?.9:.4+(hr-pr)*.3)*dm);
  if(pl.st==='attack'&&dist<210){
    const bc=(pl.aType==='heavy'?.5:pl.aType==='medium'?.3:.2)*rm;
    if(Math.random()<bc&&aiCD<=0){I.bl=1;aiCD=.12;return I;}
  }
  if(pl.st==='idle'&&aiMem.last==='attack'&&dist<270)aiWP=.4*rm;
  aiMem.last=pl.st;
  if(aiWP>0&&dist<190&&aiCD<=0){I[dx>0?'r':'l']=1;if(dist<140){I.hv=1;aiCD=.7;}return I;}
  const pd=aiAggr>.6?80:ai.nrg>=50?130:100;
  if(dist>pd+50)I[dx>0?'r':'l']=1;
  else if(dist<pd-50)I[dx>0?'l':'r']=1;
  else{aiDT-=dt;if(aiDT<=0){aiSD=Math.random()<.3?-aiSD:aiSD;aiDT=.3+Math.random()*.5;}if(Math.random()<.25*dm)I[aiSD>0?'r':'l']=1;}
  if(projs.some(p=>p.alive&&p.own!==ai&&Math.abs(p.x-ai.x)<170)&&ai.gnd&&Math.random()<.35*rm)I.j=1;
  if(Math.random()<.003*dm&&ai.gnd&&dist<230)I.j=1;
  if(dist<190&&aiCD<=0&&!I.bl){
    const r=Math.random();
    if(dist<100){
      if(r<.12*aiAggr){I.lt=1;aiCD=.25;}
      else if(r<.19*aiAggr){I.md=1;aiCD=.45;}
      else if(r<.24*aiAggr){I.hv=1;aiCD=.65;}
      else if(r<.27*aiAggr&&ai.nrg>=50){I.sp=1;aiCD=.9;}
      else if(r<.30*aiAggr){I.up=1;aiCD=.6;}
    }else if(dist<160){
      if(r<.08*aiAggr){I.md=1;aiCD=.45;}
      else if(r<.12*aiAggr){I.hv=1;aiCD=.65;}
      else if(r<.14&&ai.nrg>=50){I.sp=1;aiCD=1.1;}
    }else if(ai.nrg>=50&&r<.04*dm){I.sp=1;aiCD=1.2;}
  }
  if(!ai.gnd&&dist<160&&aiCD<=0&&Math.random()<.08*dm){I.lt=1;aiCD=.4;}
  if(ai.gnd&&dist<130&&aiCD<=0&&Math.random()<.05*dm){I.cr=1;I.lt=1;aiCD=.5;}
  return I;
}

// ── Effects ────────────────────────────────────────────────────
let hitFlash=0, shakeT=0, shakeX=0, shakeY=0, slowMo=0;
const particles=[];
function spark(x,y,c,n,spd){for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,s=spd*(.5+Math.random()*.5);particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-60,life:.4+Math.random()*.4,age:0,c,sz:2+Math.random()*4});}}
function updFX(dt){
  hitFlash=Math.max(0,hitFlash-dt);shakeT=Math.max(0,shakeT-dt);slowMo=Math.max(0,slowMo-dt);
  if(shakeT>0){const s=shakeT/.4;shakeX=(Math.random()-.5)*14*s;shakeY=(Math.random()-.5)*9*s;}else shakeX=shakeY=0;
  for(let i=particles.length-1;i>=0;i--){const p=particles[i];p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=350*dt;p.age+=dt;if(p.age>=p.life)particles.splice(i,1);}
}
function drawParts(){for(const p of particles){ctx.globalAlpha=Math.max(0,1-p.age/p.life);ctx.fillStyle=p.c;ctx.fillRect(p.x-p.sz/2,p.y-p.sz/2,p.sz,p.sz);}ctx.globalAlpha=1;}

// ── Projectiles + Float Text ───────────────────────────────────
const projs=[], floats=[];
function float(t,x,y,c){floats.push({t,x,y,vy:-70,age:0,life:1.2,c:c||'#fff'});}
function rOvlp(a,b){return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y;}

// ── Combo System ───────────────────────────────────────────────
const combo=[{n:0,t:0,d:0,mx:.8},{n:0,t:0,d:0,mx:.8}];
function cScale(n){return n<=1?1:n===2?.9:n===3?.75:n===4?.6:.5;}
function cStun(b,n){return n<=1?b:Math.max(.12,b*(1-n*.08));}

// ── Fighter Class ──────────────────────────────────────────────
class Fighter{
  constructor(id,x,name,atks,faceDir,isAI,charType){
    this.id=id;this.x=x;this.y=GROUND;this.vx=0;this.vy=0;
    this.w=55;this.h=155;this.name=name;this.face=faceDir;
    this.atks=atks;this.ai=isAI;this.ct=charType;
    this.hp=MAX_HP;this.mhp=MAX_HP;this.nrg=0;this.mnrg=MAX_NRG;
    this.st='idle';this.aType=null;this.aFrame=0;this.aHit=false;
    this.hurtT=0;this.blockT=0;this.kbx=0;this.kby=0;
    this.aF=0;this.aT=0;this.wF=0;this.wT=0;this.jF=0;
    this.gnd=true;this.rounds=0;this._koA=0;
    this._cc=false;this._ccT=0;this._flash=0;
  }
  get hbox(){return{x:this.x-this.w/2,y:this.y-this.h,w:this.w,h:this.h};}
  atkBox(){
    if(this.st!=='attack')return null;
    const a=this.atks[this.aType];if(!a)return null;
    if(this.aFrame<a.su||this.aFrame>=a.su+a.ac)return null;
    return{x:this.x+(a.hx*this.face)-a.hw/2,y:this.y+a.hy,w:a.hw,h:a.hh};
  }
  recvHit(a,af,aid){
    if(this.st==='ko')return false;
    if(this.st==='block'||this.blockT>0){
      this.hp=Math.max(0,this.hp-Math.floor(a.dmg*.1));
      sfx('block');float('BLOCK',this.x,this.y-175,'#88aaff');
      spark(this.x+this.face*-20,this.y-85,'#6688ff',5,80);return true;
    }
    const cs=combo[aid!==undefined?aid:(this.id===0?1:0)];
    cs.n++;cs.t=cs.mx;
    const sd=Math.ceil(a.dmg*cScale(cs.n));cs.d+=sd;
    this.hp=Math.max(0,this.hp-sd);
    this.hurtT=cStun(.35,cs.n);this.st='hurt';
    this.kbx=af*a.push;if(a.kb>0)this.kby=-a.kb*6;
    this._flash=.1;sfx('hit');hitFlash=.06;
    spark(this.x,this.y-this.h/2,'#ffaa44',6+cs.n*2,100+cs.n*20);
    if(cs.n>=2)float(cs.n+' HIT!',this.x,this.y-215,'#ffcc00');
    float('-'+sd,this.x,this.y-185,'#ff4444');
    if(this.hp<=0){this.st='ko';sfx('ko');shakeT=.6;slowMo=.5;spark(this.x,this.y-this.h/2,'#ff2200',25,220);}
    return true;
  }
  update(dt,inp,opp){
    this._flash=Math.max(0,this._flash-dt);
    if(!this.gnd)this.vy+=GRAVITY*dt;
    if(this.st==='ko'){this._koA+=dt*1.5;this.x+=this.kbx*dt;this.kbx*=(1-dt*8);this.x=Math.max(STAGE_L+this.w/2,Math.min(STAGE_R-this.w/2,this.x));this.y+=this.vy*dt;if(this.y>=GROUND){this.y=GROUND;this.vy=0;}return;}
    if(['idle','walk','crouch'].includes(this.st))this.face=opp.x>this.x?1:-1;
    if(Math.abs(this.kbx)>1){this.x+=this.kbx*dt;this.kbx*=(1-dt*10);}
    if(this.kby!==0){this.vy+=this.kby;this.kby=0;}
    if(this.st==='hurt'){this.hurtT-=dt;if(this.hurtT<=0)this.st='idle';this.x=Math.max(STAGE_L+this.w/2,Math.min(STAGE_R-this.w/2,this.x));this.y+=this.vy*dt;if(this.y>=GROUND){this.y=GROUND;this.vy=0;this.gnd=true;}return;}
    if(this.st==='attack'){
      this.aFrame++;const a=this.atks[this.aType];if(!a){this.st='idle';return;}
      if(!this.aHit){
        const ab=this.atkBox();
        if(ab&&rOvlp(ab,opp.hbox)&&opp.recvHit(a,this.face,this.id)){
          this.aHit=true;this.nrg=Math.min(this.mnrg,this.nrg+15);this._cc=true;this._ccT=.2;
        }
        if(a.proj&&this.aFrame===a.su+2&&this.nrg>=50){
          const pc=this.ct==='tek'?'#00ffaa':'#ff4422';
          projs.push({own:this,x:this.x+this.face*65,y:this.y-110,vx:this.face*800,vy:0,w:90,h:25,dmg:a.dmg,alive:true,age:0,c:pc});
          this.nrg-=50;
        }
      }
      if(this.aFrame>=a.su+a.ac+a.re){this.st='idle';this.aType=null;this.aFrame=0;this.aHit=false;this._cc=false;this._ccT=0;}
      if(this._cc){this._ccT-=dt;if(this._ccT<=0)this._cc=false;
        else{
          const ch=this.aType==='light'?['medium','upper']:this.aType==='medium'?['heavy','upper']:this.aType==='upper'?['heavy']:[];
          for(const na of ch){if(inp[na==='medium'?'md':na==='heavy'?'hv':na==='upper'?'up':'lt']){
            this.st='attack';this.aType=na;this.aFrame=0;this.aHit=false;this._cc=false;this._ccT=0;sfx(this.atks[na].snd);break;}}
          if(inp.sp&&this.nrg>=50){this.st='attack';this.aType='special';this.aFrame=0;this.aHit=false;this._cc=false;this._ccT=0;sfx('special');}
        }
      }
      if(!this.gnd){this.y+=this.vy*dt;if(this.y>=GROUND){this.y=GROUND;this.vy=0;this.gnd=true;}}
      return;
    }
    if(inp.bl){this.st='block';this.blockT=.15;this.vx=0;return;}
    if(this.st==='block'){this.blockT-=dt;if(this.blockT<=0&&!inp.bl)this.st='idle';return;}
    if(inp.cr&&this.gnd&&(inp.lt||inp.md||inp.hv)&&this.st!=='attack'){
      this.st='attack';this.aType='crouchA';this.aFrame=0;this.aHit=false;sfx('whoosh');return;}
    if(!this.gnd&&(inp.lt||inp.md||inp.hv)&&this.st!=='attack'){
      this.st='attack';this.aType='jumpA';this.aFrame=0;this.aHit=false;sfx('whoosh');return;}
    if(inp.up&&this.gnd&&this.st!=='attack'){
      this.st='attack';this.aType='upper';this.aFrame=0;this.aHit=false;
      this.vy=JUMP_VEL*.6;this.gnd=false;sfx('uppercut');return;}
    if(this.gnd){
      for(const[k,n]of[['lt','light'],['md','medium'],['hv','heavy'],['sp','special']]){
        if(inp[k]&&this.st!=='attack'){
          if(n==='special'&&this.nrg<50){float('NO ENERGY',this.x,this.y-175,'#888');break;}
          this.st='attack';this.aType=n;this.aFrame=0;this.aHit=false;sfx(this.atks[n].snd);break;}}
    }
    if(this.st!=='attack'){
      if(inp.l)this.vx=-WALK_SPEED;else if(inp.r)this.vx=WALK_SPEED;else this.vx*=(1-dt*22);
      if(inp.j&&this.gnd){this.vy=JUMP_VEL;this.gnd=false;this.jF=0;sfx('jump');}
      if(this.gnd&&inp.cr)this.st='crouch';
      else if(this.gnd&&Math.abs(this.vx)>15)this.st='walk';
      else if(!this.gnd)this.st='jump';
      else this.st='idle';
    }
    this.x+=this.vx*dt;this.y+=this.vy*dt;
    if(this.y>=GROUND){this.y=GROUND;this.vy=0;this.gnd=true;if(this.st==='jump')this.st='idle';}
    else this.gnd=false;
    this.x=Math.max(STAGE_L+this.w/2,Math.min(STAGE_R-this.w/2,this.x));
    this.nrg=Math.min(this.mnrg,this.nrg+3*dt);
    this.wT+=dt;if(this.wT>.1){this.wT=0;this.wF=(this.wF+1)%6;}
    this.aT+=dt;if(this.aT>.25){this.aT=0;this.aF=(this.aF+1)%4;}
    if(this.st==='jump'){this.jF=this.vy<-200?0:this.vy<200?1:2;}
  }
  getAnim(){
    const M=this.ct==='tek'?T:L;
    const s=this.st,a=this.aType;
    if(s==='ko')return[M.ko,Math.min(M.ko.length-1,Math.floor(this._koA))];
    if(s==='hurt')return[M.hurt,this.hurtT>.15?0:1];
    if(s==='block')return[M.block,this.blockT>.07?0:1];
    if(s==='crouch')return[M.crouch,0];
    if(s==='jump')return[M.jump,this.jF];
    if(s==='attack'&&a){
      const atk=this.atks[a];if(!atk)return[M.idle,0];
      const an=M[atk.anim];if(!an)return[M.idle,0];
      const tot=atk.su+atk.ac+atk.re;
      const idx=Math.min(an.length-1,Math.floor(this.aFrame/tot*an.length));
      return[an,idx];
    }
    if(s==='walk'){
      const fwd=(this.vx>0&&this.face===1)||(this.vx<0&&this.face===-1);
      return fwd?[M.walkF,this.wF%M.walkF.length]:[M.walkB,this.wF%M.walkB.length];
    }
    return[M.idle,this.aF%M.idle.length];
  }
  draw(){
    const SC=this.ct==='tek'?.85:1.0;
    const[anim,idx]=this.getAnim();
    drawSpr(anim,idx,this.x,this.y,this.face===-1,SC);
    if(this._flash>0){
      const f=anim[idx%anim.length];if(f){
        const[,,,sw,sh]=f;const dw=sw*SC,dh=sh*SC;
        ctx.save();ctx.globalAlpha=this._flash/.1*.4;ctx.fillStyle='#fff';
        ctx.fillRect(this.x-dw/2,this.y-dh,dw,dh);ctx.restore();
      }
    }
  }
}

// ── Background ─────────────────────────────────────────────────
function drawBG(){
  if(sheets.bg){
    const sc=Math.max(W/sheets.bg.width,H/sheets.bg.height);
    const bw=sheets.bg.width*sc,bh=sheets.bg.height*sc;
    ctx.drawImage(sheets.bg,(W-bw)/2,H-bh,bw,bh);

  }else{const g=ctx.createLinearGradient(0,0,0,H);g.addColorStop(0,'#050a1a');g.addColorStop(1,'#0a1030');ctx.fillStyle=g;ctx.fillRect(0,0,W,H);}

// ── HUD ────────────────────────────────────────────────────────
function drawHUD(a,b){
  const bW=420,bH=22,bY=24,p1=40,p2=W-40-bW;
  function hBar(x,hp,mhp,ltr,nm,rds,ac){
    const p=Math.max(0,hp/mhp);
    ctx.fillStyle='rgba(0,0,0,.7)';ctx.fillRect(x-3,bY-3,bW+6,bH+6);
    ctx.fillStyle='#111';ctx.fillRect(x,bY,bW,bH);
    ctx.fillStyle=p<.25?'#ff3300':p<.5?'#ffaa00':ac;
    ltr?ctx.fillRect(x,bY,bW*p,bH):ctx.fillRect(x+bW*(1-p),bY,bW*p,bH);
    ctx.strokeStyle='#555';ctx.lineWidth=1;ctx.strokeRect(x,bY,bW,bH);
    ctx.fillStyle=ac;ctx.font='bold 14px Courier New';ctx.textAlign=ltr?'left':'right';
    ctx.fillText(nm,ltr?x:x+bW,bY-4);
    ctx.fillStyle='#fff';ctx.font='bold 11px Courier New';ctx.textAlign='center';
    ctx.fillText(Math.ceil(hp)+'/'+mhp,x+bW/2,bY+16);
    for(let i=0;i<ROUNDS_TO_WIN;i++){const px=ltr?x+i*24:x+bW-i*24-16;ctx.fillStyle=i<rds?'#ffee00':'#333';ctx.beginPath();ctx.arc(px+8,bY+bH+14,7,0,Math.PI*2);ctx.fill();ctx.strokeStyle='#666';ctx.stroke();}
  }
  function eBar(x,e,mx,c,rdy){
    const ey=bY+bH+4,ew=bW,eh=8;
    ctx.fillStyle='rgba(0,0,0,.5)';ctx.fillRect(x-1,ey-1,ew+2,eh+2);
    ctx.fillStyle='#0a0a0a';ctx.fillRect(x,ey,ew,eh);
    if(rdy){ctx.shadowColor=c;ctx.shadowBlur=8;}
    ctx.fillStyle=c;ctx.fillRect(x,ey,ew*(e/mx),eh);ctx.shadowBlur=0;
    ctx.strokeStyle='#333';ctx.strokeRect(x,ey,ew,eh);
    ctx.fillStyle=rdy?'#fff':'#666';ctx.font='bold 8px Courier New';ctx.textAlign='left';
    ctx.fillText(rdy?'SPECIAL READY':'ENERGY',x,ey-1);
  }
  hBar(p1,a.hp,a.mhp,true,a.name,a.rounds,'#00ff88');
  eBar(p1,a.nrg,a.mnrg,'#00ffcc',a.nrg>=50);
  hBar(p2,b.hp,b.mhp,false,b.name,b.rounds,'#ff6644');
  eBar(p2,b.nrg,b.mnrg,'#ffaa00',b.nrg>=50);
  ctx.fillStyle='rgba(0,0,0,.65)';ctx.fillRect(W/2-42,10,84,58);
  ctx.fillStyle='#c8a020';ctx.fillRect(W/2-40,12,80,54);
  ctx.strokeStyle='#805010';ctx.lineWidth=2;ctx.strokeRect(W/2-40,12,80,54);
  ctx.fillStyle=roundT<=10?'#ff4444':'#fff';ctx.font='bold 34px Courier New';ctx.textAlign='center';
  ctx.fillText(Math.ceil(roundT),W/2,54);
  ctx.fillStyle='#888';ctx.font='10px Courier New';ctx.fillText('RD '+roundN,W/2,10);
  if(!mpMode){const dn=['EASY','NORMAL','HARD'],dc=['#44ff44','#ffee00','#ff4444'];
  ctx.fillStyle=dc[aiDiff];ctx.font='bold 10px Courier New';ctx.textAlign='center';ctx.fillText(dn[aiDiff],W/2,H-8);}
  else{ctx.fillStyle='#ff6644';ctx.font='bold 10px Courier New';ctx.textAlign='center';ctx.fillText('ONLINE',W/2,H-8);}
  for(let i=0;i<2;i++){const c=combo[i];if(c.n>=2){const cx=i===0?p1:p2;ctx.textAlign=i===0?'left':'right';ctx.fillStyle='#ffcc00';ctx.font='bold 18px Courier New';ctx.fillText(c.n+' HIT COMBO',cx+(i===0?0:bW),100);ctx.fillStyle='#ff8888';ctx.font='bold 13px Courier New';ctx.fillText(c.d+' dmg',cx+(i===0?0:bW),118);}}
}

// ── Projectiles Rendering ──────────────────────────────────────

function drawFloats(){for(const f of floats){const a=Math.max(0,1-f.age/f.life);ctx.globalAlpha=a;ctx.shadowColor=f.c;ctx.shadowBlur=6;ctx.fillStyle=f.c;ctx.font='bold 22px Courier New';ctx.textAlign='center';ctx.fillText(f.t,f.x,f.y);}ctx.globalAlpha=1;ctx.shadowBlur=0;}
function drawFlash(){if(hitFlash>0){ctx.fillStyle='rgba(255,255,255,'+(hitFlash/.08*.2)+')';ctx.fillRect(0,0,W,H);}}

// ── Character Select ───────────────────────────────────────────
let csCur=0,csBlink=0;
function drawCS(dt){
  csBlink+=dt;drawBG();ctx.fillStyle='rgba(0,5,20,.75)';ctx.fillRect(0,0,W,H);
  ctx.fillStyle='rgba(0,0,0,.7)';ctx.fillRect(0,0,W,100);
  ctx.fillStyle='#ffee00';ctx.font='bold 42px Courier New';ctx.textAlign='center';ctx.fillText('SELECT YOUR FIGHTER',W/2,58);
  ctx.strokeStyle='#c8a020';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(80,72);ctx.lineTo(W-80,72);ctx.stroke();
  ctx.fillStyle='#888';ctx.font='14px Courier New';ctx.fillText(mpMode?'ONLINE MATCH':'1 Player vs CPU',W/2,92);
  const pn=[{x:320,nm:'TEKNIUM',c:'#00ff88',sub:'Energy Blast \u2022 Fast Combos \u2022 Uppercut',ct:'tek'},
            {x:W-320,nm:'LOBSTER',c:'#ff6644',sub:'Beam Cannon \u2022 Heavy Damage \u2022 Flying Kick',ct:'lob'}];
  pn.forEach((p,i)=>{
    const sel=csCur===i,bx=p.x-160,by=110,bw=320,bh=360;

    ctx.strokeStyle=sel?p.c:'#333';ctx.lineWidth=sel?3:1;ctx.strokeRect(bx,by,bw,bh);
    if(sel){ctx.shadowColor=p.c;ctx.shadowBlur=25;ctx.strokeRect(bx,by,bw,bh);ctx.shadowBlur=0;}
    const M=p.ct==='tek'?T:L;
    const SC=p.ct==='tek'?.85:1.0;
    drawSpr(M.idle,Math.floor(csBlink*3)%M.idle.length,p.x,by+bh-90,false,SC*1.4);
    ctx.fillStyle=sel?p.c:'#777';ctx.font='bold 22px Courier New';ctx.textAlign='center';ctx.fillText(p.nm,p.x,by+bh-55);
    ctx.fillStyle=sel?'#aaa':'#555';ctx.font='11px Courier New';ctx.fillText(p.sub,p.x,by+bh-37);
    ctx.fillStyle=sel?'#00ff88':'#ff6644';ctx.font='bold 14px Courier New';ctx.fillText(sel?'\u25C4 YOU \u25BA':'CPU',p.x,by+bh-18);
    if(sel&&Math.sin(csBlink*6)>0){ctx.fillStyle=p.c;ctx.font='bold 24px Courier New';ctx.fillText('\u25BC',p.x,by+bh+25);}
  });
  ctx.fillStyle='#ff4444';ctx.font='bold 60px Courier New';ctx.textAlign='center';ctx.fillText('VS',W/2,320);
  if(!mpMode){
    const dn=['EASY','NORMAL','HARD'],dc=['#44ff44','#ffee00','#ff4444'];
    ctx.fillStyle='rgba(0,0,0,.6)';ctx.fillRect(W/2-120,490,240,50);
    ctx.fillStyle='#aaa';ctx.font='12px Courier New';ctx.textAlign='center';ctx.fillText('DIFFICULTY (W / S)',W/2,502);
    ctx.fillStyle=dc[aiDiff];ctx.font='bold 20px Courier New';ctx.fillText('\u25C4 '+dn[aiDiff]+' \u25BA',W/2,530);
  }else{
    ctx.fillStyle='rgba(0,0,0,.6)';ctx.fillRect(W/2-120,490,240,50);
    ctx.fillStyle='#ff6644';ctx.font='bold 16px Courier New';ctx.textAlign='center';
    ctx.fillText('ONLINE MATCH',W/2,520);
  }
  ctx.fillStyle='rgba(0,0,0,.6)';ctx.fillRect(0,H-55,W,55);
  ctx.fillStyle='#aaa';ctx.font='14px Courier New';ctx.textAlign='center';ctx.fillText('A/D choose    '+(mpMode?'':'W/S difficulty    ')+'ENTER fight',W/2,H-32);
  ctx.fillStyle='#555';ctx.font='11px Courier New';ctx.fillText('WASD move  Q block  U/I/O light/med/heavy  P special  J uppercut  ESC pause  Gamepad supported',W/2,H-14);
}

// ── Pause + Overlays ───────────────────────────────────────────
let pauseC=0;
function drawPause(){ctx.fillStyle='rgba(0,0,0,.65)';ctx.fillRect(0,0,W,H);ctx.shadowColor='#ffee00';ctx.shadowBlur=15;ctx.fillStyle='#ffee00';ctx.font='bold 56px Courier New';ctx.textAlign='center';ctx.fillText('PAUSED',W/2,H/2-70);ctx.shadowBlur=0;['RESUME','RESTART','QUIT'].forEach((o,i)=>{const s=pauseC===i;ctx.fillStyle=s?'#00ff88':'#777';ctx.font=(s?'bold ':'')+'24px Courier New';ctx.textAlign='center';ctx.fillText((s?'\u25B6 ':'')+o,W/2,H/2+i*44);});ctx.fillStyle='#444';ctx.font='13px Courier New';ctx.fillText('ESC resume',W/2,H/2+160);}
function big(t,c,sz,yo){ctx.shadowColor=c;ctx.shadowBlur=25;ctx.fillStyle='rgba(0,0,0,.7)';ctx.font='bold '+(sz+2)+'px Courier New';ctx.textAlign='center';ctx.fillText(t,W/2+3,H/2+(yo||0)+3);ctx.fillStyle=c;ctx.font='bold '+sz+'px Courier New';ctx.fillText(t,W/2,H/2+(yo||0));ctx.shadowBlur=0;}
function drawIntro(){ctx.fillStyle='rgba(0,0,0,.5)';ctx.fillRect(0,0,W,H);if(introT>2)big('ROUND '+roundN,'#ffee00',90);else if(introT>.5)big('FIGHT!','#ff4444',100);}
function drawRO(){ctx.fillStyle='rgba(0,0,0,.55)';ctx.fillRect(0,0,W,H);big((winner?winner.name:'DRAW')+' WINS',winner&&winner.id===0?'#00ff88':'#ff4444',72);ctx.fillStyle='#888';ctx.font='20px Courier New';ctx.textAlign='center';ctx.fillText('Round '+roundN,W/2,H/2+60);}
function drawMO(){ctx.fillStyle='rgba(0,0,0,.72)';ctx.fillRect(0,0,W,H);const w=mWinner&&mWinner.id===0;big(w?'YOU WIN!':'YOU LOSE',w?'#00ff88':'#ff4444',80,-25);ctx.fillStyle='#ffee00';ctx.font='bold 28px Courier New';ctx.textAlign='center';ctx.fillText(mWinner.name+' wins the match!',W/2,H/2+30);ctx.fillStyle='#666';ctx.font='16px Courier New';ctx.fillText(mpMode?'ENTER for rematch':'ENTER to play again',W/2,H/2+75);}

// ── Input ──────────────────────────────────────────────────────
const keys={},jp={};
addEventListener('keydown',e=>{ensureAudio();if(!keys[e.key])jp[e.key]=true;keys[e.key]=true;e.preventDefault()});
addEventListener('keyup',e=>{keys[e.key]=false});
function cjp(k){const v=jp[k];jp[k]=false;return v}
let gp={l:0,r:0,u:0,d:0,a:0,b:0,x:0,y:0,lb:0,rb:0,st:0},gpp={...gp};
function pollGP(){gpp={...gp};const g=navigator.getGamepads?.()[0];if(!g)return;const ax=g.axes,db=.3;gp={l:ax[0]<-db?1:0,r:ax[0]>db?1:0,u:ax[1]<-db?1:0,d:ax[1]>db?1:0,a:g.buttons[0]?.pressed?1:0,b:g.buttons[1]?.pressed?1:0,x:g.buttons[2]?.pressed?1:0,y:g.buttons[3]?.pressed?1:0,lb:g.buttons[4]?.pressed?1:0,rb:g.buttons[5]?.pressed?1:0,st:g.buttons[9]?.pressed?1:0};}
function gjp(b){return gp[b]&&!gpp[b]}
function pInp(){return{l:keys.a||keys.A||keys.ArrowLeft||gp.l,r:keys.d||keys.D||keys.ArrowRight||gp.r,j:keys.w||keys.W||keys.ArrowUp||gjp('u')||gjp('y'),cr:keys.s||keys.S||keys.ArrowDown||gp.d,bl:keys.q||keys.Q||gp.lb,lt:keys.u||keys.U||gjp('a'),md:keys.i||keys.I||gjp('b'),hv:keys.o||keys.O||gjp('x'),sp:keys.p||keys.P||gjp('rb'),up:keys.j||keys.J||gjp('y')};}

// ── Game State ─────────────────────────────────────────────────
let gs='loading', roundT=ROUND_TIME, roundN=1, introT=3, roT=0;
let winner=null, mWinner=null, ftr=[], sRds=[0,0];

function startMatch(pc){
  aiCD=0;aiWP=0;
  const pN=pc===0?'TEKNIUM':'LOBSTER', cN=pc===0?'LOBSTER':'TEKNIUM';
  const pA=pc===0?TEK_ATK:LOB_ATK, cA=pc===0?LOB_ATK:TEK_ATK;
  const pC=pc===0?'tek':'lob', cC=pc===0?'lob':'tek';
  ftr=[new Fighter(0,300,pN,pA,1,false,pC),new Fighter(1,W-300,cN,cA,-1,true,cC)];
  ftr[0].rounds=sRds[0];ftr[1].rounds=sRds[1];
  roundT=ROUND_TIME;introT=3;projs.length=0;floats.length=0;particles.length=0;
  hitFlash=0;shakeT=0;slowMo=0;
  combo[0].n=combo[0].t=combo[0].d=0;combo[1].n=combo[1].t=combo[1].d=0;
  gs='intro';sfx('ready');
}

// ── Main Loop ──────────────────────────────────────────────────
let last=0;
function loop(ts){
  let dt=Math.min((ts-last)/1000,.05);last=ts;
  if(slowMo>0)dt*=.3;
  pollGP();updFX(dt);
  ctx.save();if(shakeT>0)ctx.translate(shakeX,shakeY);
  const[f0,f1]=ftr.length>1?ftr:[null,null];

  if(gs==='loading'){
    ctx.fillStyle='#050a1a';ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#ffee00';ctx.font='bold 32px Courier New';ctx.textAlign='center';ctx.fillText('TEKxLOBSTER',W/2,H/2-50);
    ctx.fillStyle='#888';ctx.font='18px Courier New';ctx.fillText('LOADING'+'.'.repeat(Math.floor(Date.now()/400)%4),W/2,H/2);
    ctx.fillStyle='#555';ctx.font='14px Courier New';ctx.fillText(loaded+'/'+TOTAL,W/2,H/2+30);
    if(loaded>=TOTAL)gs='modeSelect';
  }
  // ── MODE SELECT ──────────────────────────────────────────
  else if(gs==='modeSelect'){
    drawBG();
    ctx.fillStyle='rgba(0,5,20,.85)';ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#ffee00';ctx.font='bold 52px Courier New';ctx.textAlign='center';
    ctx.fillText('TEKxLOBSTER',W/2,160);
    ctx.fillStyle='#888';ctx.font='18px Courier New';
    ctx.fillText('v2 \u2014 World Class 2D Fighting',W/2,195);
    const modes=[
      {y:280,label:'SOLO vs CPU',desc:'Classic single player arcade mode',c:'#00ff88'},
      {y:380,label:'ONLINE MATCH',desc:'Fight a random stranger on the internet!',c:'#ff6644'},
    ];
    modes.forEach((m,i)=>{
      const sel=modeSelCur===i;
      const bx=W/2-220,bw=440,bh=70;
      ctx.fillStyle=sel?'rgba(0,30,60,.9)':'rgba(0,10,25,.5)';
      ctx.fillRect(bx,m.y,bw,bh);
      ctx.strokeStyle=sel?m.c:'#333';ctx.lineWidth=sel?3:1;
      ctx.strokeRect(bx,m.y,bw,bh);
      if(sel){ctx.shadowColor=m.c;ctx.shadowBlur=20;ctx.strokeRect(bx,m.y,bw,bh);ctx.shadowBlur=0;}
      ctx.fillStyle=sel?m.c:'#666';ctx.font='bold 28px Courier New';ctx.textAlign='center';
      ctx.fillText(m.label,W/2,m.y+35);
      ctx.fillStyle=sel?'#aaa':'#444';ctx.font='13px Courier New';
      ctx.fillText(m.desc,W/2,m.y+55);
    });
    ctx.fillStyle='#444';ctx.font='13px Courier New';ctx.textAlign='center';
    ctx.fillText('W/S select    ENTER confirm',W/2,H-30);
    if(cjp('w')||cjp('W')||cjp('ArrowUp')||gjp('u')){modeSelCur=0;sfx('cursor');}
    if(cjp('s')||cjp('S')||cjp('ArrowDown')||gjp('d')){modeSelCur=1;sfx('cursor');}
    if(cjp('Enter')||gjp('a')||gjp('st')){
      sfx('select');
      if(modeSelCur===0){mpMode=false;gs='charSelect';}
      else{mpMode=true;gs='lobby';joinLobby();}
    }
  }
  // ── LOBBY ────────────────────────────────────────────────
  else if(gs==='lobby'){
    lobbyBlink+=dt;
    drawBG();
    ctx.fillStyle='rgba(0,5,20,.85)';ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#ffee00';ctx.font='bold 42px Courier New';ctx.textAlign='center';
    ctx.fillText('\u26A1 ONLINE ARENA \u26A1',W/2,100);
    ctx.fillStyle='#00ff88';ctx.font='18px Courier New';
    const dots='.'.repeat(Math.floor(lobbyBlink*2)%4);
    ctx.fillText(mpStatus+dots,W/2,160);
    const pCount=Object.keys(lobbyPlayers).length;
    ctx.fillStyle='#888';ctx.font='14px Courier New';
    ctx.fillText(pCount>0?pCount+' opponent(s) online':'No opponents yet \u2014 share the link!',W/2,200);
    if(pCount===0){
      ctx.fillStyle='#555';ctx.font='12px Courier New';
      ctx.fillText('Send this to a friend:',W/2,280);
      ctx.fillStyle='#00ccff';ctx.font='bold 14px Courier New';
      ctx.fillText(location.href,W/2,305);
    }
    // List players
    let py=240;
    for(const uid in lobbyPlayers){
      const p=lobbyPlayers[uid];
      if(p.status!=='waiting')continue;
      ctx.fillStyle='rgba(0,20,40,.6)';ctx.fillRect(W/2-200,py,400,45);
      ctx.strokeStyle='#ff6644';ctx.lineWidth=1;ctx.strokeRect(W/2-200,py,400,45);
      ctx.fillStyle='#aaa';ctx.font='bold 18px Courier New';ctx.textAlign='left';
      ctx.fillText(p.name||'Unknown',W/2-180,py+30);
      py+=55;
    }
    // Auto-challenge first available player
    if(mpReady&&pCount>0&&!challengerUid){
      const firstUid=Object.keys(lobbyPlayers).find(u=>lobbyPlayers[u].status==='waiting');
      if(firstUid){
        challengerUid=firstUid;
        challengerName=lobbyPlayers[firstUid].name||'Unknown';
        sendChallenge(firstUid);
        challengeFlash=2.5;challengeAlpha=0;chalCur=0;challengeTimer=15;
        sfx('challenger');
        gs='challenge';
      }
    }
    ctx.fillStyle='#555';ctx.font='13px Courier New';ctx.textAlign='center';
    ctx.fillText('ESC to go back',W/2,H-30);
    if(cjp('Escape')){leaveLobby();gs='modeSelect';}
  }
  // ── CHALLENGE SCREEN ─────────────────────────────────────
  else if(gs==='challenge'){
    challengeFlash=Math.max(0,challengeFlash-dt);
    challengeAlpha=Math.min(1,challengeAlpha+dt*2);
    drawBG();
    ctx.fillStyle='rgba(0,0,0,.88)';ctx.fillRect(0,0,W,H);
    // Flash effect
    if(challengeFlash>1.5){
      const fl=Math.sin(challengeFlash*12)*.5+.5;
      ctx.fillStyle='rgba(255,255,100,'+fl*.15+')';ctx.fillRect(0,0,W,H);
    }
    ctx.save();
    ctx.globalAlpha=challengeAlpha;
    ctx.shadowColor='#ff4444';ctx.shadowBlur=30;
    ctx.fillStyle='#ff4444';ctx.font='bold 48px Courier New';ctx.textAlign='center';
    ctx.fillText('A CHALLENGER IS',W/2,240);
    ctx.fillText('APPROACHING!',W/2,300);
    ctx.shadowBlur=0;
    ctx.fillStyle='#ffee00';ctx.font='bold 36px Courier New';
    ctx.fillText(challengerName,W/2,380);
    // Lightning bolts
    const lx=Math.sin(Date.now()/100)*5;
    ctx.fillStyle='#ffee00';ctx.font='bold 60px Courier New';
    ctx.fillText('\u26A1',W/2-250+lx,300);
    ctx.fillText('\u26A1',W/2+250-lx,300);
    if(challengeData&&mpRole!=='host'){
      // We're being challenged — show accept/decline
      ctx.fillStyle=chalCur===0?'#00ff88':'#555';
      ctx.font='bold 30px Courier New';ctx.textAlign='center';
      ctx.fillText(chalCur===0?'\u25B6 ACCEPT':'ACCEPT',W/2-120,480);
      ctx.fillStyle=chalCur===1?'#ff4444':'#555';
      ctx.fillText(chalCur===1?'\u25B6 DECLINE':'DECLINE',W/2+120,480);
      if(challengeTimer!==null){
        challengeTimer-=dt;
        const tp=Math.max(0,challengeTimer/15);
        ctx.fillStyle='#222';ctx.fillRect(W/2-150,510,300,8);
        ctx.fillStyle=tp<.3?'#ff4444':'#ffee00';ctx.fillRect(W/2-150,510,300*tp,8);
        if(challengeTimer<=0){declineChallenge();}
      }
      if(cjp('a')||cjp('A')||cjp('ArrowLeft')||gjp('l')){chalCur=0;sfx('cursor');}
      if(cjp('d')||cjp('D')||cjp('ArrowRight')||gjp('r')){chalCur=1;sfx('cursor');}
      if(cjp('Enter')||gjp('a')){
        if(chalCur===0)acceptChallenge();
        else declineChallenge();
        sfx('select');
      }
    }else{
      // We sent the challenge — waiting
      ctx.fillStyle='#888';ctx.font='20px Courier New';
      ctx.fillText('Waiting for response'+'.'.repeat(Math.floor(Date.now()/400)%4),W/2,480);
    }
    ctx.restore();
    if(cjp('Escape')){declineChallenge();}
  }
  // ── CHARACTER SELECT ─────────────────────────────────────
  else if(gs==='charSelect'){
    drawCS(dt);
    if(cjp('a')||cjp('A')||cjp('ArrowLeft')||gjp('l')){csCur=0;sfx('cursor');}
    if(cjp('d')||cjp('D')||cjp('ArrowRight')||gjp('r')){csCur=1;sfx('cursor');}
    if(!mpMode){
      if(cjp('w')||cjp('W')||cjp('ArrowUp')||gjp('u')){aiDiff=Math.max(0,aiDiff-1);sfx('cursor');}
      if(cjp('s')||cjp('S')||cjp('ArrowDown')||gjp('d')){aiDiff=Math.min(2,aiDiff+1);sfx('cursor');}
    }
    if(cjp('Enter')||cjp('u')||cjp('U')||gjp('a')||gjp('st')){
      sfx('select');sRds=[0,0];roundN=1;
      if(mpMode&&mpConnected){
        // Send our character pick to opponent
        peerConn.send({type:'charPick',char:csCur});
        mpCharConfirmed=true;
        if(mpOppChar>=0)beginMpMatch();
        else mpStatus='Waiting for opponent to pick...';
      }else{
        startMatch(csCur);
      }
    }
    if(cjp('Escape')){
      if(mpMode){leaveLobby();}
      gs='modeSelect';
    }
  }
  else if(gs==='intro'){introT-=dt;drawBG();if(f0&&f1){f0.draw();f1.draw();drawHUD(f0,f1);}drawIntro();if(introT<=0)gs='playing';}
  // ── PLAYING ──────────────────────────────────────────────
  else if(gs==='playing'){
    if(cjp('Escape')||gjp('st')){gs='paused';pauseC=0;}
    // MULTIPLAYER or SOLO input
    if(mpMode&&mpConnected){
      localFrame++;
      const myInp=pInp();
      localInputs[localFrame]=myInp;
      sendInput(localFrame,myInp);
      f0.update(dt,myInp,f1);
      // Mirror left/right — remote player's "right" is our "left" since they're on the opposite side
      const ri=netInput(localFrame-INPUT_DELAY);
      const mirrored={...ri, l:ri.r, r:ri.l};
      f1.update(dt,mirrored,f0);
      // Cleanup old frames
      for(const k in remoteInputs)if(+k<localFrame-120)delete remoteInputs[k];
      for(const k in localInputs)if(+k<localFrame-120)delete localInputs[k];
    }else{
      f0.update(dt,pInp(),f1);f1.update(dt,aiInput(f1,f0,dt),f0);
    }
    for(const p of projs){if(!p.alive)continue;p.x+=p.vx*dt;p.age+=dt;const tg=p.own===f0?f1:f0;if(rOvlp({x:p.x-p.w/2,y:p.y-p.h/2,w:p.w,h:p.h},tg.hbox)){tg.recvHit({dmg:p.dmg,push:160,kb:20},p.vx>0?1:-1,p.own.id);p.alive=false;spark(p.x,p.y,p.c,12,130);}if(p.x<-50||p.x>W+50||p.age>2.5)p.alive=false;}
    for(let i=projs.length-1;i>=0;i--)if(!projs[i].alive)projs.splice(i,1);
    for(const f of floats){f.y+=f.vy*dt;f.age+=dt;}
    for(let i=floats.length-1;i>=0;i--)if(floats[i].age>=floats[i].life)floats.splice(i,1);
    for(const c of combo){if(c.n>0){c.t-=dt;if(c.t<=0){c.n=c.d=c.t=0;}}}
    if(f0&&f1){const ov=40-Math.abs(f0.x-f1.x);if(ov>0&&Math.abs(f0.y-f1.y)<100){const p=ov/2+1;if(f0.x<f1.x){f0.x-=p;f1.x+=p}else{f0.x+=p;f1.x-=p}}}
    roundT-=dt;
    if(f0.st==='ko'||f1.st==='ko'||roundT<=0){
      winner=f0.st==='ko'?f1:f1.st==='ko'?f0:f0.hp>=f1.hp?f0:f1;
      winner.rounds++;sRds[winner.id]++;gs='roundOver';roT=3;
    }
    drawBG();drawProjs();f0.draw();f1.draw();drawParts();drawFloats();drawFlash();drawHUD(f0,f1);
  }
  else if(gs==='paused'){
    drawBG();if(f0&&f1){drawProjs();f0.draw();f1.draw();drawHUD(f0,f1);}drawPause();
    if(cjp('ArrowUp')||cjp('w')||cjp('W')||gjp('u')){pauseC=Math.max(0,pauseC-1);sfx('cursor');}
    if(cjp('ArrowDown')||cjp('s')||cjp('S')||gjp('d')){pauseC=Math.min(2,pauseC+1);sfx('cursor');}
    if(cjp('Escape')||gjp('st'))gs='playing';
    if(cjp('Enter')||cjp('u')||cjp('U')||gjp('a')){
      if(pauseC===0)gs='playing';else if(pauseC===1){sRds=[0,0];roundN=1;startMatch(csCur);}
      else{sRds=[0,0];roundN=1;if(mpMode)leaveLobby();gs='modeSelect';}sfx('select');}
  }
  else if(gs==='roundOver'){
    drawBG();if(f0&&f1){drawProjs();f0.draw();f1.draw();drawParts();drawHUD(f0,f1);}drawRO();roT-=dt;
    if(roT<=0){
      if(sRds[0]>=ROUNDS_TO_WIN||sRds[1]>=ROUNDS_TO_WIN){mWinner=sRds[0]>=ROUNDS_TO_WIN?ftr[0]:ftr[1];gs='matchOver';}
      else{
        roundN++;
        if(mpMode&&mpConnected){
          // Reset for next round in MP
          beginMpMatch();
        }else{
          startMatch(csCur);
        }
      }
    }
  }
  else if(gs==='matchOver'){
    drawBG();if(f0&&f1){f0.draw();f1.draw();drawHUD(f0,f1);}drawMO();
    if(cjp('Enter')||gjp('a')||gjp('st')){
      if(mpMode&&mpConnected){
        localWantsRematch=true;
        peerConn.send({type:'rematch'});
        if(remoteWantsRematch)doRematch();
        else mpStatus='Waiting for rematch...';
      }else{
        sRds=[0,0];roundN=1;csCur=0;gs='modeSelect';
      }
    }
  }

  // ── MP Status Bar (always visible when in MP mode) ─────
  if(mpMode&&gs!=='modeSelect'&&gs!=='loading'){
    ctx.fillStyle='rgba(0,0,0,.5)';ctx.fillRect(0,0,W,16);
    ctx.fillStyle=mpConnected?'#00ff88':'#ff6644';ctx.font='bold 10px Courier New';ctx.textAlign='left';
    ctx.fillText(mpConnected?'\u25CF ONLINE':'\u25CB OFFLINE',8,12);
    ctx.fillStyle='#555';ctx.textAlign='right';ctx.fillText(mpStatus,W-8,12);
  }

  ctx.restore();requestAnimationFrame(loop);
}
document.addEventListener('click',()=>{ensureAudio();AC?.resume()},{once:true});
document.addEventListener('keydown',()=>{ensureAudio();AC?.resume()},{once:true});
requestAnimationFrame(loop);
</script>
