const AC = new (window.AudioContext || window.webkitAudioContext)();
function playSound(type) {
  try {
    const o = AC.createOscillator(), g = AC.createGain();
    o.connect(g); g.connect(AC.destination);
    const t = AC.currentTime;
    if (type==='hit')    { o.type='sawtooth'; o.frequency.setValueAtTime(220,t); o.frequency.exponentialRampToValueAtTime(80,t+0.08);  g.gain.setValueAtTime(0.4,t);  g.gain.exponentialRampToValueAtTime(0.001,t+0.1);   o.start(t); o.stop(t+0.1); }
    else if(type==='block')  { o.type='square';   o.frequency.setValueAtTime(600,t); o.frequency.exponentialRampToValueAtTime(400,t+0.06); g.gain.setValueAtTime(0.2,t);  g.gain.exponentialRampToValueAtTime(0.001,t+0.08);  o.start(t); o.stop(t+0.08); }
    else if(type==='special'){ o.type='sine';     o.frequency.setValueAtTime(200,t); o.frequency.exponentialRampToValueAtTime(800,t+0.15); o.frequency.exponentialRampToValueAtTime(400,t+0.3); g.gain.setValueAtTime(0.5,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.35); o.start(t); o.stop(t+0.35); }
    else if(type==='jump')   { o.type='sine';     o.frequency.setValueAtTime(300,t); o.frequency.exponentialRampToValueAtTime(500,t+0.1);  g.gain.setValueAtTime(0.15,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.12);  o.start(t); o.stop(t+0.12); }
    else if(type==='ko')     { o.type='sawtooth'; o.frequency.setValueAtTime(400,t); o.frequency.exponentialRampToValueAtTime(50,t+0.5);   g.gain.setValueAtTime(0.6,t);  g.gain.exponentialRampToValueAtTime(0.001,t+0.55);  o.start(t); o.stop(t+0.55); }
    else if(type==='whoosh') { o.type='triangle'; o.frequency.setValueAtTime(800,t); o.frequency.exponentialRampToValueAtTime(200,t+0.12); g.gain.setValueAtTime(0.15,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.14);  o.start(t); o.stop(t+0.14); }
    else if(type==='select') { o.type='sine';     o.frequency.setValueAtTime(440,t); o.frequency.setValueAtTime(660,t+0.08);              g.gain.setValueAtTime(0.3,t);  g.gain.exponentialRampToValueAtTime(0.001,t+0.25);  o.start(t); o.stop(t+0.25); }
    else if(type==='cursor') { o.type='sine';     o.frequency.setValueAtTime(330,t);                                                       g.gain.setValueAtTime(0.15,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.07);  o.start(t); o.stop(t+0.07); }
    else if(type==='ready')  { o.type='sine';     o.frequency.setValueAtTime(500,t); o.frequency.setValueAtTime(700,t+0.1);               g.gain.setValueAtTime(0.35,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.3);   o.start(t); o.stop(t+0.3); }
  } catch(e) {}
}

// ============================================================
let tekCanvas = null, lobCanvas = null, bgImg = null;
let assetsLoaded = 0;
const TOTAL_ASSETS = 3;

function keyOutGreen(img) {
  const tmp = document.createElement('canvas');
  tmp.width = img.width; tmp.height = img.height;
  const tc = tmp.getContext('2d');
  tc.drawImage(img, 0, 0);
  const id = tc.getImageData(0,0,tmp.width,tmp.height), d = id.data;
  for (let i=0;i<d.length;i+=4)
    if (d[i]<80 && d[i+1]>160 && d[i+2]<80) d[i+3]=0;
  tc.putImageData(id,0,0); return tmp;
}
function keyOutDarkGray(img) {
  const tmp = document.createElement('canvas');
  tmp.width = img.width; tmp.height = img.height;
  const tc = tmp.getContext('2d');
  tc.drawImage(img, 0, 0);
  const id = tc.getImageData(0,0,tmp.width,tmp.height), d = id.data;
  for (let i=0;i<d.length;i+=4) {
    const r=d[i],g=d[i+1],b=d[i+2];
    if (r<90 && g<90 && b<90 && Math.max(r,g,b)-Math.min(r,g,b)<20) d[i+3]=0;
  }
  tc.putImageData(id,0,0); return tmp;
}

function loadImage(src, onload) {
  const img = new Image();
  img.onload = () => { onload(img); assetsLoaded++; };
  img.onerror = () => {
    console.error('Failed to load: ' + src);
    assetsLoaded++; // still count it so game doesn't hang
  };
  img.src = src;
}

loadImage('sprites/teknium.png', img => { tekCanvas = keyOutGreen(img); });
loadImage('sprites/lobster.png', img => { lobCanvas = keyOutDarkGray(img); });

function drawSprite(sheet, map, name, cx, cy, flipX, scale) {
  if (!sheet) return;
  const s = map[name]; if (!s) return;
  const [sx,sy,sw,sh] = s;
  const dh = sh*scale, dw = sw*scale;
  ctx.save();
  ctx.translate(cx, cy);
  if (flipX) ctx.scale(-1,1);
  ctx.drawImage(sheet, sx, sy, sw, sh, -dw/2, -dh, dw, dh);
  ctx.restore();
}

// ============================================================
// AI
// ============================================================
let aiCooldown = 0;
let aiAggression = 0.5;  // 0=defensive, 1=aggressive, shifts during fight
let aiMemory = { playerAttacks: 0, playerBlocks: 0, playerJumps: 0, lastPlayerState: 'idle', whiffPunishTimer: 0 };
let aiStrafeDir = 1;  // for spacing adjustments
let aiDecisionTimer = 0;

function getAIInput(ai, player, dt) {
  aiCooldown = Math.max(0, aiCooldown - dt);
  aiWhiffPunishTimer = Math.max(0, (aiWhiffPunishTimer||0) - dt);
  const dx = player.x - ai.x, dist = Math.abs(dx);
  const inp = {left:false,right:false,jump:false,crouch:false,block:false,light:false,medium:false,heavy:false,special:false};

  // Don't interrupt own actions
  if (ai.state==='ko'||ai.state==='hurt'||ai.state==='attack') return inp;

  // Track player behavior
  if (player.state==='attack' && aiMemory.lastPlayerState!=='attack') aiMemory.playerAttacks++;
  if (player.state==='block' && aiMemory.lastPlayerState!=='block') aiMemory.playerBlocks++;
  if (player.state==='jump' && aiMemory.lastPlayerState!=='jump') aiMemory.playerJumps++;
  aiMemory.lastPlayerState = player.state;

  // Shift aggression based on HP advantage
  const hpRatio = ai.hp / ai.maxHp;
  const playerHpRatio = player.hp / player.maxHp;
  if (hpRatio < 0.3 && playerHpRatio > 0.5) aiAggression = 0.2;  // losing badly, play safe
  else if (hpRatio > 0.7 && playerHpRatio < 0.3) aiAggression = 0.9;  // winning, press advantage
  else aiAggression = 0.4 + (hpRatio - playerHpRatio) * 0.3;

  // === DEFENSIVE: Block reactions ===
  // Block when player is attacking and in range
  if (player.state==='attack' && dist<180) {
    const blockChance = player.atkType==='heavy' ? 0.4 : player.atkType==='medium' ? 0.25 : 0.15;
    if (Math.random() < blockChance && aiCooldown <= 0) {
      inp.block = true;
      aiCooldown = 0.15;
      return inp;
    }
  }

  // === PUNISH WHIFFED ATTACKS ===
  // If player just finished an attack and is in recovery, rush in
  if (player.state==='idle' && aiMemory.lastPlayerState==='attack' && dist < 250) {
    aiWhiffPunishTimer = 0.4;  // punish window
  }
  if (aiWhiffPunishTimer > 0 && dist < 180 && aiCooldown <= 0) {
    // Rush in and punish with heavy
    inp[dx>0?'right':'left'] = true;
    if (dist < 130) {
      const r = Math.random();
      if (r < 0.5) { inp.heavy = true; aiCooldown = 0.8; }
      else { inp.medium = true; aiCooldown = 0.6; }
    }
    return inp;
  }

  // === MOVEMENT ===
  // Preferred distance depends on aggression and energy
  const preferredDist = aiAggression > 0.6 ? 90 : (ai.energy >= 50 ? 140 : 110);

  if (dist > preferredDist + 40) {
    inp[dx>0?'right':'left'] = true;  // approach
  } else if (dist < preferredDist - 40) {
    inp[dx>0?'left':'right'] = true;  // back up
  } else {
    // In sweet spot -- occasional strafe for mix-up
    aiDecisionTimer -= dt;
    if (aiDecisionTimer <= 0) {
      aiStrafeDir = Math.random() < 0.3 ? -aiStrafeDir : aiStrafeDir;
      aiDecisionTimer = 0.3 + Math.random() * 0.5;
    }
    if (Math.random() < 0.3) inp[aiStrafeDir>0?'right':'left'] = true;
  }

  // === JUMPING ===
  // Jump to avoid projectiles or for mix-up
  const oppProjectile = projectiles.some(p => p.alive && p.owner === player && Math.abs(p.x - ai.x) < 150);
  if (oppProjectile && ai.isOnGround && Math.random() < 0.4) {
    inp.jump = true;
  } else if (Math.random() < 0.003 && ai.isOnGround && dist < 200 && aiAggression > 0.5) {
    inp.jump = true;  // occasional jump-in for mix-up
  }

  // === ATTACKING ===
  if (dist < 170 && aiCooldown <= 0 && !inp.block) {
    const r = Math.random();

    // Close range: mix up attacks
    if (dist < 100) {
      // In combo range - use lights to start combos
      if (r < 0.12 * aiAggression) {
        inp.light = true; aiCooldown = 0.3;
      } else if (r < 0.18 * aiAggression) {
        inp.medium = true; aiCooldown = 0.5;
      } else if (r < 0.22 * aiAggression) {
        inp.heavy = true; aiCooldown = 0.7;
      } else if (r < 0.24 && ai.energy >= 50) {
        // Use special as combo ender when close
        inp.special = true; aiCooldown = 1.0;
      }
    }
    // Mid range: poke with medium/heavy
    else if (dist < 150) {
      if (r < 0.06 * aiAggression) {
        inp.medium = true; aiCooldown = 0.5;
      } else if (r < 0.10 * aiAggression) {
        inp.heavy = true; aiCooldown = 0.7;
      } else if (r < 0.12 && ai.energy >= 50) {
        inp.special = true; aiCooldown = 1.0;
      }
    }
    // Max range: only specials reach
    else if (ai.energy >= 50 && r < 0.04) {
      inp.special = true; aiCooldown = 1.2;
    }
  }

  // === CROUCH ===
  // Crouch to bait jump-ins occasionally
  if (dist > 120 && dist < 200 && Math.random() < 0.01) {
    inp.crouch = true;
  }

  return inp;
}

// ============================================================
// SCREEN EFFECTS
// ============================================================
let hitFlash=0, shakeTimer=0, shakeX=0, shakeY=0;
function triggerHitFlash() { hitFlash=0.08; }
function triggerShake()    { shakeTimer=0.4; }
function updateEffects(dt) {
  hitFlash  = Math.max(0, hitFlash-dt);
  shakeTimer= Math.max(0, shakeTimer-dt);
  if (shakeTimer>0) { shakeX=(Math.random()-0.5)*10*(shakeTimer/0.4); shakeY=(Math.random()-0.5)*6*(shakeTimer/0.4); }
  else { shakeX=0; shakeY=0; }
}

// ============================================================
// PROJECTILES + FLOATS
// ============================================================
const projectiles = [];
const floats = [];
function spawnFloat(text, x, y, color) { floats.push({text,x,y,vy:-60,age:0,life:1.2,color:color||'#fff'}); }
function rectsOverlap(a,b) { return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y; }

// ============================================================
// COMBO SYSTEM
// ============================================================
// Each fighter tracks their own combo (hits THEY land on opponent)
const comboState = [
  { count: 0, timer: 0, damage: 0, maxTimer: 0.8 },  // fighter 0's combo on opponent
  { count: 0, timer: 0, damage: 0, maxTimer: 0.8 },  // fighter 1's combo on opponent
];
// Damage scaling: combos deal less damage per hit to prevent infinite juggles
function getComboDamageScale(comboCount) {
  if (comboCount <= 0) return 1.0;
  if (comboCount === 1) return 1.0;
  if (comboCount === 2) return 0.9;
  if (comboCount === 3) return 0.75;
  if (comboCount === 4) return 0.6;
  return 0.5;  // cap at 50% damage for 5+ hit combos
}
// Hitstun scaling: more hits = less stun so opponent can escape
function getComboHitstun(baseStun, comboCount) {
  if (comboCount <= 1) return baseStun;
  return Math.max(0.12, baseStun * (1 - comboCount * 0.08));
}

// ============================================================
// FIGHTER CLASS
// ============================================================
class Fighter {
  constructor(id, x, name, atks, facing, isAI) {
    this.id=id; this.x=x; this.y=GROUND; this.vx=0; this.vy=0;
    this.w=60; this.h=140; this.name=name; this.facing=facing;
    this.atks=atks; this.isAI=isAI||false;
    this.hp=200; this.maxHp=200; this.energy=0; this.maxEnergy=100;
    this.state='idle'; this.atkType=null; this.atkFrame=0; this.atkHit=false;
    this.hurtTimer=0; this.blockTimer=0; this.kbVx=0; this.kbVy=0;
    this.animF=0; this.animT=0; this.walkF=0; this.walkT=0;
    this.jumpF=0; this.isOnGround=true; this.rounds=0; this._koAge=0;
    this.charType=(name==='TEKNIUM')?'tek':'lob';
    this._canCancel=false; this._cancelTimer=0;  // combo cancel window
  }
  get hitbox() { return {x:this.x-this.w/2,y:this.y-this.h,w:this.w,h:this.h}; }
  atkHitbox() {
    if (this.state!=='attack') return null;
    const a=this.atks[this.atkType],af=this.atkFrame;
    if (af<a.startup||af>=a.startup+a.active) return null;
    return {x:this.x+(a.hitOX*this.facing)-a.hitW/2,y:this.y+a.hitOY,w:a.hitW,h:a.hitH};
  }
  receiveHit(atk, atkFacing, attackerId) {
    if (this.state==='ko') return false;
    if (this.state==='block'||this.blockTimer>0) {
      this.hp=Math.max(this.hp-Math.floor(atk.damage*0.1),0);
      playSound('block'); spawnFloat('BLOCK',this.x,this.y-160,'#88aaff'); return true;
    }
    // Combo system: track hits on this fighter
    const cid = attackerId !== undefined ? attackerId : (this.id === 0 ? 1 : 0);
    const cs = comboState[cid];
    cs.count++;
    cs.timer = cs.maxTimer;
    // Apply damage scaling
    const scaledDamage = Math.ceil(atk.damage * getComboDamageScale(cs.count));
    cs.damage += scaledDamage;
    // Hitstun scales down per combo hit so opponent can eventually escape
    const baseStun = 0.35;
    const stunDuration = cs.count <= 1 ? baseStun : getComboHitstun(baseStun, cs.count);
    this.hp=Math.max(this.hp-scaledDamage,0);
    this.hurtTimer=stunDuration; this.state='hurt';
    this.kbVx=atkFacing*atk.pushback;
    if (atk.knockback>0) this.kbVy=-atk.knockback*6;
    playSound('hit'); triggerHitFlash();
    // Show combo count if 2+
    if (cs.count >= 2) {
      spawnFloat(cs.count+' HIT!',this.x,this.y-200,'#ffcc00');
      spawnFloat('-'+scaledDamage,this.x,this.y-170,'#ff4444');
    } else {
      spawnFloat('-'+scaledDamage,this.x,this.y-170,'#ff4444');
    }
    if (this.hp<=0) { this.state='ko'; playSound('ko'); triggerShake(); }
    return true;
  }
  update(dt, inp, opp) {
    if (!this.isOnGround) this.vy+=GRAVITY*dt;
    if (this.state==='ko') {
      this._koAge+=dt*1.5;
      this.x+=this.kbVx*dt; this.kbVx*=(1-dt*8);
      this.x=Math.max(STAGE_LEFT+this.w/2,Math.min(STAGE_RIGHT-this.w/2,this.x));
      this.y+=this.vy*dt; if(this.y>=GROUND){this.y=GROUND;this.vy=0;} return;
    }
    if(['idle','walk','crouch'].includes(this.state)) this.facing=opp.x>this.x?1:-1;
    if(Math.abs(this.kbVx)>1){this.x+=this.kbVx*dt;this.kbVx*=(1-dt*10);}
    if(this.kbVy!==0){this.vy+=this.kbVy;this.kbVy=0;}
    if(this.state==='hurt'){
      this.hurtTimer-=dt; if(this.hurtTimer<=0)this.state='idle';
      this.x=Math.max(STAGE_LEFT+this.w/2,Math.min(STAGE_RIGHT-this.w/2,this.x)); return;
    }
    if(this.state==='attack'){
      this.atkFrame++;
      const a=this.atks[this.atkType];
      if(!this.atkHit){
        const ahb=this.atkHitbox();
        if(ahb&&rectsOverlap(ahb,opp.hitbox)){
          if(opp.receiveHit(a,this.facing,this.id)){
            this.atkHit=true;
            this.energy=Math.min(this.maxEnergy,this.energy+15);
            // COMBO: on hit, allow canceling into next attack if input is held
            // Only light and medium can be chained (not heavy or special)
            this._canCancel=true;  // brief window to input next attack
            this._cancelTimer=0.15;
          }
        }
        if(a.isSpecial&&this.atkFrame===a.startup+2&&this.energy>=50){
          projectiles.push({owner:this,x:this.x+this.facing*60,y:this.y-130,vx:this.facing*700,vy:0,w:80,h:20,damage:a.damage,alive:true,age:0});
          this.energy-=50;
        }
      }
      if(this.atkFrame>=a.startup+a.active+a.recovery){this.state='idle';this.atkType=null;this.atkFrame=0;this.atkHit=false;this._canCancel=false;this._cancelTimer=0;}
      // COMBO CANCEL: during hit advantage window, check for new attack input
      if(this._canCancel){
        this._cancelTimer-=dt;
        if(this._cancelTimer<=0){this._canCancel=false;}
        else {
          // Check for cancel into stronger attack (light->medium, medium->heavy)
          // or into special (any->special)
          const nextAtks = this.atkType==='light' ? ['medium'] : this.atkType==='medium' ? ['heavy'] : [];
          for(const na of nextAtks){
            if(inp[na]){
              this.state='attack';this.atkType=na;this.atkFrame=0;this.atkHit=false;
              this._canCancel=false;this._cancelTimer=0;
              playSound(this.atks[na].sound);break;
            }
          }
          // Special cancel from any hit
          if(inp.special&&this.energy>=50){
            this.state='attack';this.atkType='special';this.atkFrame=0;this.atkHit=false;
            this._canCancel=false;this._cancelTimer=0;
            playSound('special');
          }
        }
      }
      return;
    }
    if(inp.block){this.state='block';this.blockTimer=0.12;this.vx=0;return;}
    if(this.state==='block'){this.blockTimer-=dt;if(this.blockTimer<=0&&!inp.block)this.state='idle';return;}
    for(const [k,n] of [['light','light'],['medium','medium'],['heavy','heavy'],['special','special']]){
      if(inp[k]&&this.state!=='attack'){
        if(n==='special'&&this.energy<50){spawnFloat('NO ENERGY',this.x,this.y-160,'#888');break;}
        this.state='attack';this.atkType=n;this.atkFrame=0;this.atkHit=false;
        playSound(this.atks[n].sound);break;
      }
    }
    if(this.state!=='attack'){
      if(inp.left)this.vx=-WALK_SPEED;
      else if(inp.right)this.vx=WALK_SPEED;
      else this.vx*=(1-dt*20);
      if(inp.jump&&this.isOnGround){this.vy=JUMP_VEL;this.isOnGround=false;this.jumpF=0;playSound('jump');}
      if(this.isOnGround&&inp.crouch)this.state='crouch';
      else if(this.isOnGround&&Math.abs(this.vx)>10)this.state='walk';
      else if(!this.isOnGround)this.state='jump';
      else this.state='idle';
    }
    this.x+=this.vx*dt;this.y+=this.vy*dt;
    if(this.y>=GROUND){this.y=GROUND;this.vy=0;this.isOnGround=true;if(this.state==='jump')this.state='idle';}
    else this.isOnGround=false;
    this.x=Math.max(STAGE_LEFT+this.w/2,Math.min(STAGE_RIGHT-this.w/2,this.x));
    this.energy=Math.min(this.maxEnergy,this.energy+3*dt);
    this.walkT+=dt;if(this.walkT>0.1){this.walkT=0;this.walkF=(this.walkF+1)%(this.charType==='lob'?6:5);}
    this.animT+=dt;if(this.animT>0.28){this.animT=0;this.animF=(this.animF+1)%(this.charType==='lob'?4:3);}
    if(this.state==='jump'){
      if(this.vy<-200)this.jumpF=0; else if(this.vy<200)this.jumpF=1; else this.jumpF=2;
    }
  }
  getTekSprite() {
    const s=this.state,a=this.atkType,af=this.atkFrame,atk=this.atks[a]||{};
    if(s==='ko')return 'ko'; if(s==='hurt')return 'hurt0'; if(s==='crouch')return 'crouch';
    if(s==='block')return 'ready'; if(s==='jump')return 'jump';
    if(s==='attack'){
      if(a==='special')return 'special';
      if(a==='light')return af<atk.startup?'ready':af<atk.startup+atk.active?'punch_w':'idle0';
      if(a==='medium')return af<atk.startup?'punch_w':'punch_h';
      if(a==='heavy')return af<atk.startup?'aura':'punch_h';
    }
    if(s==='walk'){
      const fr=this.facing===1?['walkR0','walkR1','walkR2','walkR3','walkR4']:['walkL0','walkL1','walkL2','walkL3','walkL4'];
      return fr[this.walkF%5];
    }
    return ['idle0','idle1','idle2'][this.animF];
  }
  getLobSprite() {
    const s=this.state,a=this.atkType,af=this.atkFrame,atk=this.atks[a]||{};
    if(s==='ko')return ['ko0','ko1','ko2'][Math.min(2,Math.floor(this._koAge))];
    if(s==='hurt')return 'hurt0'; if(s==='crouch')return 'crouch0'; if(s==='block')return 'block1';
    if(s==='jump')return ['jumpA','jumpB','jumpC'][this.jumpF];
    if(s==='attack'){
      if(a==='special'){const pct=af/(atk.startup+atk.active+atk.recovery);return pct<0.25?'specA':pct<0.5?'specB':pct<0.8?'specC':'specD';}
      if(a==='light')return af<atk.startup?'idle0':af<atk.startup+atk.active?'lightB':'lightC';
      if(a==='medium')return af<atk.startup?'idle0':af<atk.startup+atk.active?'medA':'medC';
      if(a==='heavy')return af<atk.startup?'idle0':af<atk.startup+atk.active?'heavyB':'idle0';
    }
    if(s==='walk'){
      if(this.facing===1)return ['walkL0','walkL1','walkL2','walkL3','walkL4','walkL5'][this.walkF%6];
      return ['walkB0','walkB1','walkB2','walkB3'][this.walkF%4];
    }
    return ['idle0','idle1','idle2','idle3'][this.animF];
  }
  draw(dt) {
    const SCALE_TEK=0.72,SCALE_LOB=0.82;
    if(this.charType==='tek'){
      const sp=this.getTekSprite();
      drawSprite(tekCanvas,TEK,sp,this.x,this.y,this.facing===-1&&!sp.startsWith('walkL'),SCALE_TEK);
    } else {
      drawSprite(lobCanvas,LOB,this.getLobSprite(),this.x,this.y,this.facing===-1,SCALE_LOB);
    }
  }
}

function drawHUD(f0,f1) {
  function hbar(x,y,w,hp,maxHp,ltr,name,rounds) {
    const pct=Math.max(0,hp/maxHp);
    ctx.fillStyle='rgba(0,0,0,0.6)';ctx.fillRect(x-2,y-2,w+4,24);
    ctx.fillStyle='#111';ctx.fillRect(x,y,w,20);
    ctx.fillStyle=pct<0.25?'#ff3300':pct<0.5?'#ffaa00':'#00ff88';
    ltr?ctx.fillRect(x,y,w*pct,20):ctx.fillRect(x+w*(1-pct),y,w*pct,20);
    ctx.strokeStyle='#555';ctx.lineWidth=1;ctx.strokeRect(x,y,w,20);
    ctx.fillStyle='rgba(0,0,0,0.8)';ctx.font='bold 13px Courier New';
    ctx.textAlign=ltr?'left':'right';
    ctx.fillText(name,ltr?x+1:x+w+1,y-1);
    ctx.fillStyle='#ffee00';ctx.fillText(name,ltr?x:x+w,y-2);
    for(let i=0;i<2;i++){
      const px=ltr?x+i*22:x+w-i*22-16;
      ctx.fillStyle=i<rounds?'#ffee00':'#333';
      ctx.strokeStyle='#666';ctx.lineWidth=1;
      ctx.beginPath();ctx.arc(px+8,y+30,7,0,Math.PI*2);ctx.fill();ctx.stroke();
    }
  }
  function ebar(x,y,w,e,maxE,color,ready) {
    ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(x-1,y-1,w+2,10);
    ctx.fillStyle='#0a0a0a';ctx.fillRect(x,y,w,8);
    if(ready){ctx.shadowColor=color;ctx.shadowBlur=8;}
    ctx.fillStyle=color;ctx.fillRect(x,y,w*(e/maxE),8);
    ctx.shadowBlur=0;
    ctx.strokeStyle='#333';ctx.lineWidth=1;ctx.strokeRect(x,y,w,8);
    ctx.fillStyle=ready?'#fff':'#777';ctx.font='bold 8px Courier New';ctx.textAlign='left';
    ctx.fillText(ready?'SPECIAL READY':'ENERGY',x,y-1);
  }
  hbar(30,20,300,f0.hp,f0.maxHp,true,f0.name,f0.rounds);
  ebar(30,52,300,f0.energy,f0.maxEnergy,'#00ffcc',f0.energy>=50);
  hbar(W-330,20,300,f1.hp,f1.maxHp,false,f1.name,f1.rounds);
  ebar(W-330,52,300,f1.energy,f1.maxEnergy,'#ffaa00',f1.energy>=50);
  ctx.fillStyle='rgba(0,0,0,0.6)';ctx.fillRect(W/2-38,8,76,54);
  ctx.fillStyle='#c8a020';ctx.strokeStyle='#805010';ctx.lineWidth=2;
  ctx.fillRect(W/2-36,10,72,50);ctx.strokeRect(W/2-36,10,72,50);
  ctx.fillStyle=roundTimer<=10?'#ff4444':'#fff';
  ctx.font='bold 30px Courier New';ctx.textAlign='center';
  ctx.fillText(Math.ceil(roundTimer),W/2,50);
  ctx.fillStyle='#888';ctx.font='10px Courier New';ctx.fillText('RD '+roundNum,W/2,8);
  // Combo counters
  for(let ci=0;ci<2;ci++){
    const cs=comboState[ci];
    if(cs.count>=2){
      const cx=ci===0?30:W-330;
      const align=ci===0?'left':'right';
      ctx.fillStyle='#ffcc00';ctx.font='bold 16px Courier New';ctx.textAlign=align;
      ctx.fillText(cs.count+' HIT COMBO',cx+(ci===0?0:300),90);
      ctx.fillStyle='#ff8888';ctx.font='bold 12px Courier New';
      ctx.fillText(cs.damage+' dmg',cx+(ci===0?0:300),105);
    }
  }
}

function drawProjectiles() {

    ctx.save();ctx.translate(p.x,p.y);

    ctx.fillStyle=g;ctx.fillRect(-40,-40,80,80);
    ctx.fillStyle='#ccffdd';ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);

    ctx.moveTo(dir*(p.w/2+10),0);ctx.lineTo(dir*(p.w/2-4),-8);ctx.lineTo(dir*(p.w/2-4),8);
    ctx.closePath();ctx.fill();ctx.restore();
  }
}
function drawFloats() {
  for(const f of floats){
    const a=Math.max(0,1-f.age/f.life);
    ctx.globalAlpha=a;ctx.shadowColor=f.color;ctx.shadowBlur=6;
    ctx.fillStyle=f.color;ctx.font='bold 20px Courier New';ctx.textAlign='center';
    ctx.fillText(f.text,f.x,f.y);
  }
  ctx.globalAlpha=1;ctx.shadowBlur=0;
}
function drawHitFlash() {
  if(hitFlash>0){ctx.fillStyle=`rgba(255,255,255,${hitFlash/0.08*0.25})`;ctx.fillRect(0,0,W,H);}
}

const keys={}, justPressed={};
window.addEventListener('keydown',e=>{if(!keys[e.key])justPressed[e.key]=true;keys[e.key]=true;e.preventDefault();});
window.addEventListener('keyup',e=>{keys[e.key]=false;});
function consumeJP(k){const v=justPressed[k];justPressed[k]=false;return v;}
function getPlayerInp(){
  return {
    left:   keys['a']||keys['A']||keys['ArrowLeft'],
    right:  keys['d']||keys['D']||keys['ArrowRight'],
    jump:   keys['w']||keys['W']||keys['ArrowUp'],
    crouch: keys['s']||keys['S']||keys['ArrowDown'],
    block:  keys['q']||keys['Q'],
    light:  keys['u']||keys['U'],
    medium: keys['i']||keys['I'],
    heavy:  keys['o']||keys['O'],
    special:keys['p']||keys['P'],
  };
}

// ============================================================
// GAME STATE
// ============================================================
let gameState='loading';
let roundTimer=99,roundNum=1,introTimer=3,roundOverTimer=0;
let winner=null,matchWinner=null;
let fighters=[],savedRounds=[0,0];
let pauseCursor=0;

function startMatch(playerChar) {
  aiCooldown=0;
  const pName=playerChar===0?'TEKNIUM':'LOBSTER';
  const cName=playerChar===0?'LOBSTER':'TEKNIUM';
  fighters=[
    new Fighter(0,220,pName,playerChar===0?TEK_ATTACKS:LOB_ATTACKS,1,false),
    new Fighter(1,W-220,cName,playerChar===0?LOB_ATTACKS:TEK_ATTACKS,-1,true),
  ];
  fighters[0].rounds=savedRounds[0];
  fighters[1].rounds=savedRounds[1];
  roundTimer=99;introTimer=3;
  projectiles.length=0;floats.length=0;
  hitFlash=0;shakeTimer=0;
  // Reset combos
  comboState[0].count=0;comboState[0].timer=0;comboState[0].damage=0;
  comboState[1].count=0;comboState[1].timer=0;comboState[1].damage=0;
  gameState='intro';playSound('ready');
}

// ============================================================
// MAIN LOOP
// ============================================================
let last=0;
function loop(ts){
  const dt=Math.min((ts-last)/1000,0.05);last=ts;
  updateEffects(dt);
  ctx.save();
  if(shakeTimer>0)ctx.translate(shakeX,shakeY);

  const [f0,f1]=fighters.length>1?fighters:[null,null];

  if(gameState==='loading'){
    ctx.fillStyle='#050a1a';ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#ffee00';ctx.font='bold 26px Courier New';ctx.textAlign='center';
    ctx.fillText('LOADING'+'.'.repeat(Math.floor(Date.now()/400)%4),W/2,H/2-20);
    ctx.fillStyle='#555';ctx.font='14px Courier New';
    ctx.fillText(assetsLoaded+'/'+TOTAL_ASSETS+' assets ready',W/2,H/2+20);
    if(assetsLoaded>=TOTAL_ASSETS)gameState='charSelect';

  } else if(gameState==='charSelect'){
    drawCharSelect(dt);
    if(consumeJP('a')||consumeJP('A')||consumeJP('ArrowLeft')){charSelectCursor=0;playSound('cursor');}
    if(consumeJP('d')||consumeJP('D')||consumeJP('ArrowRight')){charSelectCursor=1;playSound('cursor');}
    if(consumeJP('Enter')||consumeJP('u')||consumeJP('U')){playSound('select');savedRounds=[0,0];roundNum=1;startMatch(charSelectCursor);}

  } else if(gameState==='intro'){
    introTimer-=dt;drawBG();
    if(f0&&f1){f0.draw(dt);f1.draw(dt);drawHUD(f0,f1);}
    drawIntroOverlay();
    if(introTimer<=0)gameState='playing';

  } else if(gameState==='playing'){
    // Pause
    if(consumeJP('Escape')){gameState='paused';pauseCursor=0;}
    f0.update(dt,getPlayerInp(),f1);
    f1.update(dt,getAIInput(f1,f0,dt),f0);
    for(const p of projectiles){
      if(!p.alive)continue;p.x+=p.vx*dt;p.age+=dt;
      const tgt=p.owner===f0?f1:f0;
      if(rectsOverlap({x:p.x-p.w/2,y:p.y-p.h/2,w:p.w,h:p.h},tgt.hitbox)){
        tgt.receiveHit({damage:p.damage,pushback:150,knockback:0},p.vx>0?1:-1);p.alive=false;
      }
      if(p.x<0||p.x>W||p.age>2)p.alive=false;
    }
    projectiles.splice(0,projectiles.length,...projectiles.filter(p=>p.alive));
    for(const f of floats){f.y+=f.vy*dt;f.age+=dt;}
    floats.splice(0,floats.length,...floats.filter(f=>f.age<f.life));
    // Tick combo timers - reset combo if timer expires (opponent escaped)
    for(const cs of comboState){
      if(cs.count>0){cs.timer-=dt;if(cs.timer<=0){cs.count=0;cs.damage=0;cs.timer=0;}}
    }
    roundTimer-=dt;
    if(f0.state==='ko'||f1.state==='ko'||roundTimer<=0){
      winner=f0.state==='ko'?f1:f1.state==='ko'?f0:f0.hp>=f1.hp?f0:f1;
      winner.rounds++;savedRounds[winner.id]++;gameState='roundOver';roundOverTimer=3;
    }
    drawBG();drawProjectiles();f0.draw(dt);f1.draw(dt);drawFloats();drawHitFlash();drawHUD(f0,f1);

  } else if(gameState==='paused'){
    // Still draw game behind pause
    drawBG();if(f0&&f1){drawProjectiles();f0.draw(dt);f1.draw(dt);drawHUD(f0,f1);}
    drawPause();
    if(consumeJP('ArrowUp')||consumeJP('w')||consumeJP('W')){pauseCursor=Math.max(0,pauseCursor-1);playSound('cursor');}
    if(consumeJP('ArrowDown')||consumeJP('s')||consumeJP('S')){pauseCursor=Math.min(2,pauseCursor+1);playSound('cursor');}
    if(consumeJP('Escape')||consumeJP('p')||consumeJP('P')){gameState='playing';}
    if(consumeJP('Enter')||consumeJP('u')||consumeJP('U')){
      if(pauseCursor===0){gameState='playing';}
      else if(pauseCursor===1){savedRounds=[0,0];roundNum=1;startMatch(charSelectCursor);}
      else if(pauseCursor===2){savedRounds=[0,0];roundNum=1;gameState='charSelect';}
      playSound('select');
    }

  } else if(gameState==='roundOver'){
    drawBG();if(f0&&f1){drawProjectiles();f0.draw(dt);f1.draw(dt);drawHUD(f0,f1);}
    drawRoundOver();roundOverTimer-=dt;
    if(roundOverTimer<=0){
      if(savedRounds[0]>=2||savedRounds[1]>=2){matchWinner=savedRounds[0]>=2?fighters[0]:fighters[1];gameState='matchOver';}
      else{roundNum++;startMatch(charSelectCursor);}
    }

  } else if(gameState==='matchOver'){
    drawBG();if(f0&&f1){f0.draw(dt);f1.draw(dt);drawHUD(f0,f1);}
    drawMatchOver();
    if(consumeJP('Enter')){savedRounds=[0,0];roundNum=1;charSelectCursor=0;gameState='charSelect';}
  }

  ctx.restore();
  requestAnimationFrame(loop);
}

document.addEventListener('click',()=>AC.resume(),{once:true});
document.addEventListener('keydown',()=>AC.resume(),{once:true});
requestAnimationFrame(loop);

</script>
</body>
</html>
